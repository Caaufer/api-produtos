<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Mobile</title>

  <style>

    @media (max-width: 600px) {
  input {
    width: 100%;
  }

  .container {
    padding: 10px;
  }
}

    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      margin-top: 50px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }

    
      .btn-delete {
  background: #ef4444;
  color: white;
  margin-top: 10px;
}
    

    li {
  background: #1e293b;
  margin: 15px auto;
  padding: 15px;
  border-radius: 12px;
  list-style: none;
  text-align: center;
  width: 90%;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}
  </style>

</head>

<body>

  <div class="container">

    <h1>📱 Tech Mobile </h1>

    <input type="text" id="nome" placeholder="Produto">
<input type="number" id="preco" placeholder="Preço">
<input type="text" id="categoria" placeholder="Categoria">
<input type="number" id="estoque" placeholder="Estoque">

    <br>

    <button onclick="adicionarProduto()">Adicionar</button>

    <h2>Produtos</h2>
    <ul id="lista"></ul>

  </div>

  <script>
    async function adicionarProduto() {
      const nome = document.getElementById('nome').value;
const preco = document.getElementById('preco').value;
const categoria = document.getElementById('categoria').value;
const estoque = document.getElementById('estoque').value;

await fetch('https://api-produtos-j3wn.onrender.com/produtos', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ nome, preco, categoria, estoque })
});

      listarProdutos();

      document.getElementById('nome').value = '';
      document.getElementById('preco').value = '';
    }

    async function listarProdutos() {
      const resposta = await fetch('https://api-produtos-j3wn.onrender.com/produtos');
      const produtos = await resposta.json();

      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      produtos.forEach(p => {
        const item = document.createElement('li');

        item.innerHTML = `
  <strong>${p.nome}</strong> - R$${p.preco} <br>
  Categoria: ${p.categoria} <br>
  Estoque: ${p.estoque} <br>

  <button onclick="editarProduto(${p.id})">Editar</button>
  <button class="btn-delete" onclick="deletarProduto(${p.id})">Excluir</button>
`;
        lista.appendChild(item);
      });
    }

    async function deletarProduto(id) {
      await fetch(`https://api-produtos-j3wn.onrender.com/produtos/${id}`, {
        method: 'DELETE'
      });

      listarProdutos();
    }

    listarProdutos();
  </script>

</body>

</html>
